<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>さんすうドリル｜３けたのたし算とひき算のひっ算</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Zen Maru Gothic', sans-serif;
            background-color: #f0f9ff;
            touch-action: none;
            overflow: hidden;
            user-select: none;
        }

        .problem-outer-frame {
            position: relative;
            width: 100%;
            height: 100%;
            border: 8px solid #38bdf8;
            border-radius: 2rem;
            background-color: white;
            padding: 4px; 
            box-sizing: border-box;
        }

        .problem-inner-frame {
            position: relative;
            width: 100%;
            height: 100%;
            border: 2px solid #bae6fd;
            border-radius: 1.5rem;
            background-color: white;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }

        #hissan-bg-owl {
            position: absolute;
            bottom: -5%;
            left: -5%;
            width: 35%;
            opacity: 0.12;
            pointer-events: none;
            z-index: 5;
            object-fit: contain;
            transition: opacity 0.5s;
            mix-blend-mode: multiply;
        }

        .hissan-grid-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
            pointer-events: none;
        }

        .hissan-grid {
            display: grid;
            grid-template-columns: repeat(var(--grid-cols, 4), 1fr);
            width: fit-content;
            border-top: 2px solid #bae6fd;
            border-left: 2px solid #bae6fd;
            background-color: white;
        }

        .digit-box {
            font-size: 3.5rem;
            font-weight: 900;
            color: #1e293b;
            width: 5.5rem;
            height: 5.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border-right: 2px solid #bae6fd;
            border-bottom: 2px solid #bae6fd;
            background-color: rgba(255, 255, 255, 0.8);
            line-height: 1;
        }

        .op-box {
            color: #0ea5e9;
            font-size: 2.5rem;
        }

        .hissan-line {
            width: calc(100% + 2px); 
            height: 6px;
            background-color: #0ea5e9;
            border-radius: 3px;
            margin-top: -4px; 
            margin-bottom: 0px; 
            position: relative;
            z-index: 20;
        }

        #memo-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            cursor: crosshair;
            touch-action: none;
        }

        .btn-push {
            @apply transition-all active:scale-95 active:translate-y-1;
        }

        .level-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            flex: 1; 
            overflow-y: auto;
            padding: 8px 16px;
            scrollbar-width: none;
            gap: 0; 
        }
        
        .level-card {
            display: flex;
            align-items: center;
            padding: 16px;  
            border: 2px solid #bae6fd; 
            border-top-width: 0; 
            transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            flex-shrink: 0;
            gap: 12px;
        }

        .level-card:first-child {
            border-top-width: 2px;
            border-top-left-radius: 1.5rem;
            border-top-right-radius: 1.5rem;
        }

        .level-card:last-child {
            border-bottom-left-radius: 1.5rem;
            border-bottom-right-radius: 1.5rem;
        }
        
        .level-card:not(.locked) { 
            @apply cursor-pointer bg-white;
        }

        .level-card:not(.locked):hover {
            z-index: 10;
            @apply border-sky-400 bg-sky-50;
        }

        .level-card.locked { @apply opacity-60 grayscale cursor-not-allowed border-slate-200 bg-slate-50 text-slate-400; }

        .loading-dots:after {
            content: '.';
            animation: dots 1.5s steps(5, end) infinite;
        }
        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60% { content: '...'; }
            80%, 100% { content: ''; }
        }

        .professor-container-circle {
            position: relative;
            width: 90px; 
            height: 90px;
            background-color: #f8fafc;
            border-radius: 9999px;
            border: 4px solid #38bdf8;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
            box-shadow: 0 4px 12px rgba(56, 189, 248, 0.2);
        }

        .bubble {
            position: relative;
            background: #ffffff;
            border: 3px solid #38bdf8;
            border-radius: 1.25rem;
            padding: 12px 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .bubble-right-side:after, .bubble-right-side:before {
            right: 100%;
            top: 50%;
            border: solid transparent;
            content: " ";
            height: 0; width: 0;
            position: absolute;
            pointer-events: none;
        }
        .bubble-right-side:after { border-right-color: #ffffff; border-width: 10px; margin-top: -10px; }
        .bubble-right-side:before { border-right-color: #38bdf8; border-width: 13px; margin-top: -13px; }
    </style>
</head>
<body class="h-screen w-screen flex items-center justify-center p-2 bg-sky-100">

    <div id="app-container" class="w-full max-w-lg h-full max-h-[900px] bg-white rounded-[3rem] flex flex-col relative overflow-hidden shadow-2xl border-4 border-white">
        
        <!-- 1. スタート画面 -->
        <div id="screen-start" class="absolute inset-0 z-[100] bg-white p-6 flex flex-col transition-opacity duration-300 overflow-hidden">
            <div class="flex items-center justify-between mb-6 flex-shrink-0 bg-gradient-to-br from-sky-50 to-white p-5 rounded-[2rem] border border-sky-100 shadow-sm">
                <h1 class="text-xl font-black text-slate-800 tracking-tight leading-tight">
                    ３・４けたの<br><span class="text-sky-600 text-2xl">たし算とひき算のひっ算</span>
                </h1>
                <div class="bg-sky-500 text-white px-4 py-2 rounded-2xl font-black shadow-lg tracking-widest text-center flex flex-col items-center justify-center leading-tight gap-0">
                    <span class="text-xs">さんすう</span>
                    <span class="text-lg">ドリル</span>
                </div>
            </div>

            <div class="flex items-center justify-center gap-4 mb-6 px-2 w-full flex-shrink-0">
                <div class="professor-container-circle">
                    <div id="img-loading-main" class="absolute z-10 text-sky-400 font-bold text-[10px] loading-dots text-center">しょうかん中</div>
                    <img id="professor-img-main" src="" alt="フクロウ博士" class="professor-img opacity-0 w-full h-full object-contain mix-blend-multiply">
                </div>
                <div class="bubble bubble-right-side font-black text-slate-700 flex-1 text-sm leading-relaxed">
                    こんにちは！<br>
                    ぜんぶのレベルをクリアして<br>
                    <span class="text-sky-600 underline">けいさんマスター</span>になろう！
                </div>
            </div>
            
            <div id="level-list" class="level-container"></div>
            
            <div class="flex-shrink-0 w-full px-4 mt-4 pb-2">
                <button onclick="playClickSound(); resetProgress();" class="w-full text-slate-400 py-2.5 rounded-2xl font-bold text-[10px] border border-slate-100 hover:bg-rose-50 hover:text-rose-400 hover:border-rose-100 transition-all btn-push">
                    🔄 学習データをリセットする
                </button>
            </div>
        </div>

        <!-- 2. 学習画面 -->
        <div id="screen-game" class="hidden h-full flex flex-col opacity-0 transition-opacity duration-300 overflow-hidden">
            <div class="flex justify-between items-center px-4 pt-3 pb-1 h-12 flex-shrink-0">
                <button onclick="playClickSound(); backToMenu();" class="bg-slate-100 text-slate-500 px-4 py-2 rounded-full font-bold text-[11px] btn-push">◀ メニュー</button>
                <div class="bg-sky-50 border border-sky-200 px-4 py-1.5 rounded-full text-sky-600 font-black text-[12px] shadow-sm flex items-center gap-2">
                    <span class="opacity-60 text-[10px]">LEVEL</span> <span id="level-display">1</span> 
                    <span class="text-sky-200">|</span>
                    <span id="step-display">1</span> / 10
                </div>
            </div>

            <div class="flex-[1] relative mx-4 mt-2 mb-2 overflow-hidden">
                <div class="problem-outer-frame shadow-lg">
                    <div id="problem-inner" class="problem-inner-frame">
                        <canvas id="memo-canvas"></canvas>
                        
                        <div class="absolute top-4 right-4 z-10 text-sky-200 font-bold text-[11px] pointer-events-none italic bg-white/40 px-2 py-1 rounded-lg">
                            ここに メモが かけるよ ✏️
                        </div>

                        <img id="hissan-bg-owl" src="" alt="背景フクロウ" class="opacity-0">
                        <div id="hissan-area" class="hissan-grid-container"></div>
                        <button onclick="playClickSound(); clearCanvas();" class="absolute bottom-2 left-2 z-[60] bg-slate-800/80 text-white px-3 py-2 rounded-xl text-[10px] font-bold shadow-lg btn-push">
                            ぜんぶ消す
                        </button>
                    </div>
                </div>
            </div>

            <div class="flex items-center gap-3 mb-8 px-6 flex-shrink-0">
                <div class="relative w-14 h-14 flex-shrink-0">
                    <div id="img-loading-mini" class="absolute inset-0 flex items-center justify-center text-[7px] text-sky-400 font-bold loading-dots bg-white rounded-full border border-sky-100"></div>
                    <img id="professor-mini" src="" class="professor-img w-full h-full rounded-full border-4 border-sky-400 shadow-md object-contain bg-white opacity-0 mix-blend-multiply">
                </div>
                <div id="game-bubble" class="bubble bubble-right-side font-bold text-slate-700 flex-1 text-sm min-h-[40px] flex items-center">
                    がんばろう！
                </div>
            </div>

            <div class="bg-sky-200 p-4 pb-6 rounded-t-[3rem] shadow-inner border-t-2 border-sky-300 flex-shrink-0 relative">
                <div id="feedback-text" class="absolute -top-6 left-0 right-0 h-6 text-center text-[16px] font-black drop-shadow-sm"></div>
                
                <div class="flex items-center gap-3 h-20">
                    <button onclick="playClickSound(); speakQuestion();" class="bg-white p-4 rounded-3xl text-3xl shadow-sm btn-push">🔊</button>
                    <div class="flex-1 h-full">
                        <input type="number" id="answer-input" 
                            class="w-full h-full text-4xl text-center font-black bg-white border-4 border-sky-400 rounded-[2rem] focus:outline-none focus:ring-4 focus:ring-yellow-300 transition-all"
                            placeholder="？" inputmode="numeric">
                    </div>
                    <button id="ok-button" onclick="checkAnswer()" class="flex-1 h-full bg-yellow-400 text-yellow-950 font-black rounded-[2rem] text-3xl shadow-[0_6px_0_0_#d97706] btn-push">
                        OK!
                    </button>
                </div>
            </div>
        </div>

        <!-- 3. リザルト画面 -->
        <div id="screen-result" class="hidden absolute inset-0 z-[200] bg-white p-8 flex flex-col items-center justify-center text-center overflow-hidden">
            <div class="relative w-48 h-48 mb-6 bg-yellow-50 rounded-full flex items-center justify-center p-4 border-4 border-yellow-400 shadow-xl">
                <div class="absolute inset-0 bg-yellow-400 rounded-full animate-ping opacity-10"></div>
                <img id="professor-img-result" src="" class="professor-img relative w-full h-full object-contain mix-blend-multiply opacity-0">
            </div>
            <h2 class="text-3xl font-black text-sky-600 mb-2">レベルクリア！</h2>
            <p id="result-message" class="text-slate-600 font-bold text-base mb-8 whitespace-pre-wrap"></p>
            <button onclick="playClickSound(); location.reload();" class="bg-sky-500 text-white px-10 py-4 rounded-full font-black text-xl shadow-xl btn-push">
                メニューへ
            </button>
        </div>
    </div>

    <!-- モーダル -->
    <div id="reset-confirm-modal" class="hidden fixed inset-0 z-[300] bg-black/50 flex items-center justify-center p-6">
        <div class="bg-white rounded-[2.5rem] p-8 w-full max-w-xs text-center shadow-2xl border-4 border-rose-400">
            <div class="text-5xl mb-4">⚠️</div>
            <h3 class="text-xl font-black text-slate-800 mb-4">きろくを<br>リセットする？</h3>
            <p class="text-slate-500 text-xs mb-6 font-bold leading-relaxed">いままでの クリアしたレベルが<br>はじめからに なっちゃうよ。</p>
            <div class="flex gap-4">
                <button onclick="playClickSound(); closeResetModal();" class="flex-1 bg-slate-100 text-slate-500 py-3 rounded-2xl font-black text-sm btn-push">やめる</button>
                <button onclick="playClickSound(); executeReset();" class="flex-1 bg-rose-500 text-white py-3 rounded-2xl font-black text-sm shadow-[0_4px_0_0_#e11d48] btn-push">リセット</button>
            </div>
        </div>
    </div>

    <script>
        const apiKey = "";
        let state = { level: 1, step: 1, n1: 0, n2: 0, ans: 0, op: '+', locked: false };
        let levelImages = {}; 
        let canvas, ctx, drawing = false, audioCtx = null;
        let feedbackTimer = null;

        const basePrompt = "cute owl character, 3D claymation style, high quality, soft studio lighting, solid pure white background, center composition, looking toward the right side of the screen, facing right, ";

        const professorEvolution = {
            1: { name: "新人フクロウ", color: "emerald", desc: "３けた：くりあがりなし", prompt: basePrompt + "wearing a small green backpack" },
            2: { name: "博士フクロウ", color: "sky", desc: "３けた：くりさがりなし", prompt: basePrompt + "wearing smart glasses and a graduation cap" },
            3: { name: "達人フクロウ", color: "orange", desc: "３けた：くりあがりあり", prompt: basePrompt + "brave explorer with a headband" },
            4: { name: "名人フクロウ", color: "purple", desc: "３けた：1000からのひき算", prompt: basePrompt + "wise wizard with a pointy wizard hat" },
            5: { name: "神フクロウ", color: "rose", desc: "４けた：最難関！", prompt: basePrompt + "majestic king owl with a golden crown" }
        };

        const praises = ["すごい！", "天才だね！", "さすが！", "完璧だよ！", "素晴らしい！", "その調子！"];
        const encouragements = ["がんばろう！", "きみならできる！", "全集中だ！", "落ち着いてね", "あきらめないで！", "いい調子だよ！"];

        function playClickSound() {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const now = audioCtx.currentTime;
                const o = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                o.type = 'sine';
                o.frequency.setValueAtTime(600, now);
                o.frequency.exponentialRampToValueAtTime(300, now + 0.1);
                g.gain.setValueAtTime(0.05, now);
                g.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                o.connect(g); g.connect(audioCtx.destination);
                o.start(); o.stop(now + 0.1);
            } catch(e) {}
        }

        function playSuccessSound() {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const now = audioCtx.currentTime;
                const tone = (f, s, d) => {
                    const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                    o.type = 'triangle';
                    o.frequency.setValueAtTime(f, s); g.gain.setValueAtTime(0.05, s);
                    g.gain.exponentialRampToValueAtTime(0.01, s + d);
                    o.connect(g); g.connect(audioCtx.destination); o.start(s); o.stop(s + d);
                };
                tone(880, now, 0.1); tone(1320, now + 0.1, 0.4);
            } catch(e) {}
        }

        function playErrorSound() {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const now = audioCtx.currentTime;
                const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                o.type = 'square';
                o.frequency.setValueAtTime(150, now);
                o.frequency.linearRampToValueAtTime(100, now + 0.2);
                g.gain.setValueAtTime(0.03, now);
                g.gain.linearRampToValueAtTime(0.01, now + 0.2);
                o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(now + 0.2);
            } catch(e) {}
        }

        function getUnlockedLevel() { return parseInt(localStorage.getItem('sansu_unlocked_level') || '1'); }
        function saveProgress(level) {
            const current = getUnlockedLevel();
            if (level >= current && level < 5) localStorage.setItem('sansu_unlocked_level', level + 1);
        }
        function resetProgress() { document.getElementById('reset-confirm-modal').classList.remove('hidden'); }
        function closeResetModal() { document.getElementById('reset-confirm-modal').classList.add('hidden'); }
        function executeReset() { localStorage.removeItem('sansu_unlocked_level'); location.reload(); }

        function renderLevelList() {
            const unlocked = getUnlockedLevel();
            const list = document.getElementById('level-list');
            list.innerHTML = '';
            for (let i = 1; i <= 5; i++) {
                const config = professorEvolution[i];
                const isLocked = i > unlocked;
                const card = document.createElement('div');
                const colorMap = {
                    emerald: 'text-emerald-900',
                    sky: 'text-sky-900',
                    orange: 'text-orange-900',
                    purple: 'text-purple-900',
                    rose: 'text-rose-900'
                };
                card.className = `level-card ${colorMap[config.color]} ${isLocked ? 'locked' : ''} btn-push`;
                if (!isLocked) card.onclick = () => { playClickSound(); setTimeout(() => startLevel(i), 150); };
                card.innerHTML = `
                    <div class="bg-${config.color}-500 text-white px-2 py-1 min-w-[5.5rem] rounded-xl flex items-center justify-center font-black text-sm flex-shrink-0 shadow-sm leading-none">
                        レベル ${i}
                    </div>
                    <div class="flex flex-col flex-1 min-w-0">
                        <div class="flex items-baseline gap-2">
                            <span class="font-black text-base truncate">${config.name}</span>
                        </div>
                        <div class="text-[10px] font-bold text-slate-500 leading-tight">${config.desc}</div>
                    </div>
                    <div class="flex-shrink-0">
                         ${isLocked ? '<span class="text-xl">🔒</span>' : '<span class="text-sky-500 font-black text-xl">▶</span>'}
                    </div>
                `;
                list.appendChild(card);
            }
        }

        async function updateProfessorVisual(level) {
            const loaders = [document.getElementById('img-loading-main'), document.getElementById('img-loading-mini')];
            if (levelImages[level]) {
                applyProfessorImage(levelImages[level]);
                loaders.forEach(l => l && l.classList.add('hidden'));
                return;
            }
            const config = professorEvolution[level];
            loaders.forEach(l => l && l.classList.remove('hidden'));
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ instances: [{ prompt: config.prompt }], parameters: { sampleCount: 1 } })
                });
                const result = await response.json();
                if (result.predictions?.[0]) {
                    const url = `data:image/png;base64,${result.predictions[0].bytesBase64Encoded}`;
                    levelImages[level] = url; 
                    applyProfessorImage(url);
                }
            } catch (err) {
                const placeholder = "https://via.placeholder.com/400/sky/white?text=🦉";
                levelImages[level] = placeholder;
                applyProfessorImage(placeholder);
            } finally { 
                loaders.forEach(l => l && l.classList.add('hidden'));
            }
        }

        function applyProfessorImage(url) {
            const ids = ['professor-img-main', 'professor-mini', 'professor-img-result', 'hissan-bg-owl'];
            ids.forEach(id => { 
                const el = document.getElementById(id); 
                if(el) {
                    el.src = url; 
                    el.onload = () => el.classList.remove('opacity-0');
                    if(el.complete) el.classList.remove('opacity-0');
                }
            });
        }

        async function startLevel(l) {
            state.level = l;
            state.step = 1;
            const gameScreen = document.getElementById('screen-game');
            const startScreen = document.getElementById('screen-start');
            startScreen.classList.add('opacity-0');
            setTimeout(() => {
                startScreen.classList.add('hidden');
                gameScreen.classList.remove('hidden');
                updateProfessorVisual(l);
                setTimeout(() => {
                    gameScreen.classList.remove('opacity-0');
                    document.getElementById('level-display').innerText = l;
                    document.getElementById('game-bubble').innerText = encouragements[0];
                    initCanvas();
                    initQuestion();
                }, 50);
            }, 300);
        }

        function backToMenu() {
            if (feedbackTimer) clearTimeout(feedbackTimer);
            const gameScreen = document.getElementById('screen-game');
            const startScreen = document.getElementById('screen-start');
            gameScreen.classList.add('opacity-0');
            setTimeout(() => {
                gameScreen.classList.add('hidden');
                startScreen.classList.remove('hidden');
                renderHissan(); 
                renderLevelList();
                updateProfessorVisual(getUnlockedLevel());
                setTimeout(() => { startScreen.classList.remove('opacity-0'); }, 50);
            }, 300);
        }

        function initCanvas() {
            canvas = document.getElementById('memo-canvas');
            const parent = document.getElementById('problem-inner');
            const rect = parent.getBoundingClientRect();
            canvas.width = rect.width; 
            canvas.height = rect.height;
            ctx = canvas.getContext('2d');
            ctx.strokeStyle = '#38bdf8'; ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            const getPos = (e) => {
                const r = canvas.getBoundingClientRect();
                const cx = e.clientX || (e.touches && e.touches[0].clientX);
                const cy = e.clientY || (e.touches && e.touches[0].clientY);
                return { x: (cx - r.left) * (canvas.width / r.width), y: (cy - r.top) * (canvas.height / r.height) };
            };
            const start = (e) => { drawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); };
            const move = (e) => { if (!drawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); };
            const stop = () => { drawing = false; };
            canvas.onmousedown = start; canvas.onmousemove = move; window.onmouseup = stop;
            canvas.ontouchstart = (e) => { e.preventDefault(); start(e); };
            canvas.ontouchmove = (e) => { e.preventDefault(); move(e); };
            canvas.ontouchend = stop;
        }

        function initQuestion() {
            state.locked = false;
            if (feedbackTimer) clearTimeout(feedbackTimer);
            document.getElementById('step-display').innerText = state.step;
            clearCanvas();
            generateProblem();
            renderHissan();
            updateUI();
            
            const input = document.getElementById('answer-input');
            input.focus();
            input.onkeydown = (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    checkAnswer();
                }
            };
        }

        function generateProblem() {
            const level = state.level;
            const r = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
            if (level === 1) { 
                state.op = '+';
                let a = r(1, 4); let d = r(1, 4); let b = r(1, 4); let e = r(1, 4); let c = r(1, 4); let f = r(1, 4);
                state.n1 = a * 100 + b * 10 + c; state.n2 = d * 100 + e * 10 + f;
            } else if (level === 2) { 
                state.op = '-';
                let a = r(5, 9); let d = r(1, 4); let b = r(5, 9); let e = r(1, 4); let c = r(5, 9); let f = r(1, 4);
                state.n1 = a * 100 + b * 10 + c; state.n2 = d * 100 + e * 10 + f;
            } else if (level === 3) { 
                state.op = '+';
                state.n1 = r(151, 699); state.n2 = r(151, 299);
            } else if (level === 4) { 
                state.op = '-';
                if (state.step % 4 === 0) { state.n1 = 1000; state.n2 = r(111, 888); } 
                else { state.n1 = r(500, 999); state.n2 = r(111, 499); }
            } else if (level === 5) { 
                state.op = Math.random() > 0.5 ? '+' : '-';
                if (state.op === '+') { state.n1 = r(1111, 4888); state.n2 = r(1111, 4888); } 
                else { state.n1 = r(5555, 9888); state.n2 = r(1111, 4444); }
            }
            state.ans = state.op === '+' ? state.n1 + state.n2 : state.n1 - state.n2;
        }

        function renderHissan() {
            const is4 = state.n1 >= 1000 || state.n2 >= 1000 || state.ans >= 1000;
            const dc = is4 ? 4 : 3; 
            const totalCols = dc + 1;
            const area = document.getElementById('hissan-area');
            if (!area) return;
            area.innerHTML = ''; 
            area.style.setProperty('--grid-cols', totalCols);

            const grid = document.createElement('div');
            grid.className = 'hissan-grid';
            grid.style.setProperty('--grid-cols', totalCols);

            const s1 = String(state.n1).padStart(dc, ' ').split('');
            const s2 = String(state.n2).padStart(dc, ' ').split('');

            grid.innerHTML += `<div class="digit-box"></div>`;
            s1.forEach(d => {
                grid.innerHTML += `<div class="digit-box">${d.trim() === '' ? '' : d}</div>`;
            });
            grid.innerHTML += `<div class="digit-box op-box">${state.op === '+' ? '＋' : '－'}</div>`;
            s2.forEach(d => {
                grid.innerHTML += `<div class="digit-box">${d.trim() === '' ? '' : d}</div>`;
            });
            area.appendChild(grid);

            const line = document.createElement('div');
            line.className = 'hissan-line';
            area.appendChild(line);

            const resultGrid = document.createElement('div');
            resultGrid.className = 'hissan-grid';
            resultGrid.style.setProperty('--grid-cols', totalCols);
            resultGrid.style.borderTop = 'none'; 
            for(let i = 0; i < totalCols; i++) {
                resultGrid.innerHTML += `<div class="digit-box ans-row bg-sky-50/20"></div>`;
            }
            area.appendChild(resultGrid);
        }

        function checkAnswer() {
            if (state.locked) return;
            const input = document.getElementById('answer-input');
            const val = parseInt(input.value);
            const fb = document.getElementById('feedback-text');
            
            if (isNaN(val)) return;

            if (val === state.ans) {
                state.locked = true;
                playSuccessSound();
                document.getElementById('game-bubble').innerText = praises[Math.floor(Math.random()*praises.length)];
                fb.innerText = "⭕ 正解！"; fb.className = "absolute -top-6 left-0 right-0 text-center text-[20px] font-black text-red-500 animate-bounce";
                
                const ansStr = String(state.ans);
                const ansBoxes = document.querySelectorAll('.ans-row');
                for (let i = 0; i < ansStr.length; i++) {
                    const idx = ansBoxes.length - ansStr.length + i;
                    if (ansBoxes[idx]) ansBoxes[idx].innerText = ansStr[i];
                }
                
                setTimeout(() => {
                    if (state.step < 10) { state.step++; initQuestion(); } 
                    else {
                        saveProgress(state.level);
                        document.getElementById('screen-game').classList.add('hidden');
                        document.getElementById('screen-result').classList.remove('hidden');
                        document.getElementById('result-message').innerText = `${professorEvolution[state.level].name}の\nしれんを のりこえた！`;
                    }
                }, 1500);
            } else {
                playErrorSound();
                fb.innerText = "❌ もういちど！"; fb.className = "absolute -top-6 left-0 right-0 text-center text-[16px] font-black text-blue-500";
                feedbackTimer = setTimeout(() => { fb.innerText = ""; input.value = ""; input.focus(); }, 3000);
            }
        }

        function clearCanvas() { if (ctx) ctx.clearRect(0, 0, canvas.width, canvas.height); }
        function updateUI() { document.getElementById('answer-input').value = ""; document.getElementById('feedback-text').innerText = ""; }

        function speakQuestion() {
            try {
                speechSynthesis.cancel();
                const uttr = new SpeechSynthesisUtterance(`${state.n1}、${state.op==='+'?'たす':'ひく'}、${state.n2}、は？`);
                uttr.lang = 'ja-JP'; uttr.rate = 1.2; uttr.pitch = 1.2;
                speechSynthesis.speak(uttr);
            } catch(e) {}
        }

        window.onload = () => { renderLevelList(); updateProfessorVisual(getUnlockedLevel()); };
    </script>
</body>
